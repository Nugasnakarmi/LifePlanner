<div class="root">
  <div class="board">
    <div class="board-header">
      <button mat-button class="back-button" (click)="goToBoards()">
        <mat-icon>arrow_back</mat-icon>
        Boards
      </button>
      @if(selectedBoard) {
      <span class="board-name">{{ selectedBoard.name }}</span>
      }
      <button
        mat-button
        class="drag-mode-button"
        [class.drag-mode-active]="listDragEnabled"
        (click)="toggleListDrag()"
        [title]="listDragEnabled ? 'Disable list reordering' : 'Enable list reordering'"
      >
        <mat-icon>drag_indicator</mat-icon>
        {{ listDragEnabled ? 'Lock Lists' : 'Reorder Lists' }}
      </button>
    </div>
    @if(tasks$ | async; as tasks){
    <div class="board-wrapper">
      <div class="board-columns" cdkDropListGroup>
        @for(container of containers; track container){
        <div class="board-column" cdkDrag [cdkDragDisabled]="!listDragEnabled">
          <div class="title-container flex-row-space-between">
            <div class="column-title">{{ container }}</div>
            <button class="add-task-button" (click)="openAddTask(container)">
              <mat-icon>add</mat-icon>
            </button>
          </div>
          <div
            class="tasks-container example-list"
            cdkDropList
            #todoList="cdkDropList"
            [id]="container"
            [cdkDropListData]="containerRefs[container]"
            (cdkDropListDropped)="drop($event)"
          >
            @for(item of containerRefs[container]; track item; let ind =
            $index){
            <app-task
              [task]="item"
              [container]="container"
              [index]="ind"
            ></app-task>
            }
          </div>
        </div>
        }
      </div>
    </div>
    }
  </div>
</div>
