    <script>
      // Single Page Apps for GitHub Pages
      // https://github.com/rafgraph/spa-github-pages
      // Restores the path that was encoded by the 404.html redirect.
      // The 404.html encodes the route as: /?/path&encoded-query-string
      // where all '&' in the original query string were replaced with '~and~',
      // so splitting on '&' gives exactly [path, encoded-query-string].
      (function (l) {
        if (l.search[1] === '/') {
          var decoded = l.search
            .slice(1)
            .split('&')
            .map(function (s) {
              return s.replace(/~and~/g, '&');
            })
            .join('?');
          window.history.replaceState(
            null,
            null,
            l.pathname.slice(0, -1) + decoded + l.hash
          );
        }
      })(window.location);
    </script>
