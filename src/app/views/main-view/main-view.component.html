<div class="root">
  <div class="board">
    <div class="board-header">
      <button mat-button class="back-button" (click)="goToBoards()">
        <mat-icon>arrow_back</mat-icon>
        Boards
      </button>
      @if(selectedBoard) {
      <span class="board-name">{{ selectedBoard.name }}</span>
      }
      <button
        mat-button
        class="drag-mode-button"
        [class.drag-mode-active]="listDragEnabled"
        (click)="toggleListDrag()"
        [title]="listDragEnabled ? 'Disable list reordering' : 'Enable list reordering'"
      >
        <mat-icon>drag_indicator</mat-icon>
        {{ listDragEnabled ? 'Lock Lists' : 'Reorder Lists' }}
      </button>
    </div>
    @if(tasks$ | async; as tasks){
    <div class="board-wrapper">
      <div class="board-columns" cdkDropListGroup>
        @for(config of listConfigs; track config.key){
        <div class="board-column board-column--{{ config.key }}" cdkDrag [cdkDragDisabled]="!listDragEnabled">
          <div class="title-container flex-row-space-between">
            <div class="column-title">{{ config.displayName }}</div>
            <div class="title-actions">
              <button class="expand-list-button" (click)="openExpandList(config.key)" title="Expand list to fullscreen" aria-label="Expand list to fullscreen">
                <mat-icon>open_in_full</mat-icon>
              </button>
              <button class="add-task-button" (click)="openAddTask(config.key)">
                <mat-icon>add</mat-icon>
              </button>
            </div>
          </div>
          <div
            class="tasks-container example-list"
            cdkDropList
            #todoList="cdkDropList"
            [id]="config.key"
            [cdkDropListData]="containerRefs[config.key]"
            (cdkDropListDropped)="drop($event)"
          >
            @for(item of containerRefs[config.key]; track item; let ind =
            $index){
            <app-task
              [task]="item"
              [container]="config.key"
              [index]="ind"
              [dragEnabled]="listDragEnabled"
            ></app-task>
            }
          </div>
        </div>
        }
      </div>
    </div>
    }
  </div>
</div>
