<div class="share-dialog">
  <div class="share-dialog-header">
    <mat-icon class="share-dialog-icon">share</mat-icon>
    <h2 class="share-dialog-title">Share Template</h2>
    <button mat-icon-button class="share-dialog-close" (click)="close()" aria-label="Close">
      <mat-icon>close</mat-icon>
    </button>
  </div>

  <div class="share-dialog-template-name">{{ data.template.name }}</div>

  <div class="share-dialog-body">
    <div class="share-toggle-row">
      <div class="share-toggle-label">
        <mat-icon>link</mat-icon>
        <div class="share-toggle-text">
          <span class="share-toggle-title">Share via link</span>
          <span class="share-toggle-subtitle">Anyone with the link can add a copy of this template to their collection.</span>
        </div>
      </div>
      <mat-slide-toggle
        [checked]="isShareable"
        [disabled]="saving"
        (change)="toggleSharing($event.checked)"
        aria-label="Enable link sharing">
      </mat-slide-toggle>
    </div>

    @if (isShareable) {
      <div class="share-link-section">
        <div class="share-link-box">
          <span class="share-link-url">{{ shareUrl }}</span>
          <button
            mat-icon-button
            class="share-copy-btn"
            (click)="copyLink()"
            [matTooltip]="linkCopied ? 'Copied!' : 'Copy link'"
            aria-label="Copy share link">
            <mat-icon>{{ linkCopied ? 'check' : 'content_copy' }}</mat-icon>
          </button>
        </div>
        <p class="share-link-hint">
          <mat-icon>info_outline</mat-icon>
          Recipients click the link, then select <strong>Add to My Templates</strong> on the Boards page.
        </p>
      </div>
    }
  </div>

  <div class="share-dialog-actions">
    <button mat-stroked-button (click)="close()">Done</button>
  </div>
</div>
