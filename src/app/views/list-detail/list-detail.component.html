<div class="list-detail-container flex-column">
  <div class="list-detail-header flex-row-space-between">
    <span class="list-container-label">{{ data.displayName }}</span>
    <div class="header-actions">
      <button class="add-button" (click)="openAddTask()" title="Add task" aria-label="Add task">
        <mat-icon>add</mat-icon>
      </button>
      <button class="close-button" (click)="close()" title="Collapse" aria-label="Collapse">
        <mat-icon>close_fullscreen</mat-icon>
      </button>
    </div>
  </div>

  <div class="list-detail-body">
    @if(tasks$ | async; as tasks){
      @if(tasks.length === 0){
        <p class="empty-message">No tasks yet. Add one above!</p>
      }
      @for(task of tasks; track task.id){
        <div class="task-item flex-row-space-between">
          <div class="task-info">
            <span class="task-name">{{ task.name }}</span>
            @if(task.description){
              <p class="task-description">{{ task.description }}</p>
            }
          </div>
          <div class="task-actions flex-column-center">
            <button class="expand-button" (click)="onExpandTask(task)" title="Expand to fullscreen" aria-label="Expand to fullscreen">
              <mat-icon class="expand-icon">open_in_full</mat-icon>
            </button>
            <button class="edit-button" (click)="onEditTask(task)" title="Edit task" aria-label="Edit task">
              <mat-icon class="edit-icon">edit</mat-icon>
            </button>
            <button class="delete-button" (click)="deleteTask(task.id)" title="Delete task" aria-label="Delete task">
              <mat-icon class="delete-icon">delete</mat-icon>
            </button>
          </div>
        </div>
      }
    }
  </div>
</div>
