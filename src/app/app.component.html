<nav class="navbar app-navbar" role="navigation" aria-label="main navigation">
  <div class="navbar-brand">
    <div class="navbar-item">
      <h1 class="app-name has-gradient-text" (click)="navigateToHome()">
        LifePlanner
      </h1>
    </div>
    <button
      class="navbar-burger"
      [class.is-active]="menuActive"
      (click)="toggleMenu()"
      aria-label="menu"
      aria-controls="navbar-main-menu"
      [attr.aria-expanded]="menuActive"
    >
      <span aria-hidden="true"></span>
      <span aria-hidden="true"></span>
      <span aria-hidden="true"></span>
    </button>
  </div>

  <div id="navbar-main-menu" class="navbar-menu" [class.is-active]="menuActive">
    <div class="navbar-end">
      <div class="navbar-item">
        <button
          mat-icon-button
          (click)="themeService.toggleTheme()"
          class="theme-toggle-button"
          [attr.aria-label]="themeService.isDarkMode() ? 'Switch to light mode' : 'Switch to dark mode'"
        >
          <mat-icon>{{ themeService.isDarkMode() ? 'light_mode' : 'dark_mode' }}</mat-icon>
        </button>
      </div>
      <div class="navbar-item" *ngIf="userEmail">
        <button mat-button [matMenuTriggerFor]="userMenu" class="user-menu-button">
          <mat-icon>account_circle</mat-icon>
          <span class="user-email">{{ userEmail }}</span>
          <mat-icon>arrow_drop_down</mat-icon>
        </button>
        <mat-menu #userMenu="matMenu">
          <div class="menu-email-header" mat-menu-item disabled>{{ userEmail }}</div>
          <button mat-menu-item (click)="logout()">
            <mat-icon>logout</mat-icon>
            <span>Logout</span>
          </button>
        </mat-menu>
      </div>
    </div>
  </div>
</nav>

<router-outlet></router-outlet>
