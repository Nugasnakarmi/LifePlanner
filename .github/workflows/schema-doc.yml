name: Generate Schema Documentation

on:
  workflow_run:
    workflows:
      - "Supabase Migrations"
    types:
      - completed
    branches:
      - main
  workflow_dispatch:

jobs:
  generate-schema-doc:
    runs-on: ubuntu-latest
    # For workflow_run: only proceed when the upstream migrations job succeeded.
    # workflow_dispatch has no conclusion context, so allow it unconditionally.
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' }}

    permissions:
      contents: write

    env:
      SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
      SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}
      PROJECT_ID: vcnvdgoqpadvxyglbjsx

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Link Supabase project
        run: supabase link --project-ref $PROJECT_ID

      - name: Dump database schema
        run: supabase db dump --schema public -f /tmp/schema.sql

      - name: Generate schema documentation
        run: |
          cat > /tmp/gen_schema.py << 'PYEOF'
          import re
          import hashlib

          with open('/tmp/schema.sql', 'r') as f:
              sql = f.read()

          schema_hash = hashlib.sha256(sql.encode()).hexdigest()[:8]

          # ── helpers ─────────────────────────────────────────────────────────

          def _unquote(s):
              """Strip surrounding double-quotes from an SQL identifier."""
              return s.strip('"')

          def find_primary_keys(sql):
              """Return {table: set(pk_columns)} from ALTER TABLE … PRIMARY KEY stmts.

              Handles both standard pg_dump format (PRIMARY KEY (cols)) and the
              Supabase CLI format (PRIMARY KEY using index "idx_name") where the
              column list is resolved via the corresponding CREATE UNIQUE INDEX stmt.
              Supports both quoted ("public"."table") and unquoted (public.table)
              identifiers, and the optional ONLY keyword.
              """
              pks = {}
              # Standard pg_dump: PRIMARY KEY (col1, col2, ...)
              pat = re.compile(
                  r'ALTER TABLE (?:ONLY\s+)?(?:"?public"?\.)?("?\w+"?)[^;]*?'
                  r'ADD CONSTRAINT "?\w+"? PRIMARY KEY \(([^)]+)\)',
                  re.IGNORECASE,
              )
              for m in pat.finditer(sql):
                  pks[_unquote(m.group(1))] = {_unquote(c.strip()) for c in m.group(2).split(',')}

              # Supabase CLI: PRIMARY KEY using index "idx_name" — resolve via CREATE UNIQUE INDEX
              idx_cols = {}
              idx_pat = re.compile(
                  r'CREATE UNIQUE INDEX "?(\w+)"? ON (?:"?public"?\.)?(?:"?\w+"?)\s+USING \w+ \(([^)]+)\)',
                  re.IGNORECASE,
              )
              for m in idx_pat.finditer(sql):
                  idx_cols[_unquote(m.group(1))] = {_unquote(c.strip()) for c in m.group(2).split(',')}

              pk_idx_pat = re.compile(
                  r'ALTER TABLE (?:ONLY\s+)?(?:"?public"?\.)?("?\w+"?)[^;]*?'
                  r'ADD CONSTRAINT "?\w+"? PRIMARY KEY using index "?(\w+)"?',
                  re.IGNORECASE,
              )
              for m in pk_idx_pat.finditer(sql):
                  table = _unquote(m.group(1))
                  idx   = _unquote(m.group(2))
                  if idx in idx_cols:
                      pks[table] = idx_cols[idx]

              return pks

          def find_foreign_keys(sql):
              """Return {table: {column: description}} from FOREIGN KEY stmts.

              Supports quoted identifiers, optional ONLY keyword, any referenced
              schema (not just public), and only recognises valid ON DELETE actions
              to avoid capturing trailing noise like Supabase's 'not valid'.
              """
              fks = {}
              pat = re.compile(
                  r'ALTER TABLE (?:ONLY\s+)?(?:"?public"?\.)?("?\w+"?)[^;]*?'
                  r'ADD CONSTRAINT "?\w+"? FOREIGN KEY \(([^)]+)\)\s+'
                  r'REFERENCES\s+((?:"?\w+"?\.)?(?:"?\w+"?))\s*\(([^)]+)\)([^;]*)',
                  re.IGNORECASE,
              )
              for m in pat.finditer(sql):
                  table   = _unquote(m.group(1))
                  cols    = [_unquote(c.strip()) for c in m.group(2).split(',')]
                  ref_raw = m.group(3)
                  ref     = '.'.join(_unquote(p) for p in ref_raw.split('.'))
                  ref_col = _unquote(m.group(4).strip())
                  tail    = m.group(5)
                  od      = re.search(
                      r'ON DELETE (NO ACTION|SET NULL|SET DEFAULT|CASCADE|RESTRICT)',
                      tail, re.IGNORECASE,
                  )
                  suffix  = f' ON DELETE {od.group(1).upper()}' if od else ''
                  fks.setdefault(table, {})
                  for col in cols:
                      fks[table][col] = f'FK → `{ref}({ref_col})`{suffix}'
              return fks

          def find_identity_columns(sql):
              """Return {table: {column: label}} for GENERATED AS IDENTITY columns.

              Handles both the standard pg_dump ALTER COLUMN … ADD GENERATED form
              and the Supabase CLI inline form where the identity spec appears
              directly in the CREATE TABLE column definition.
              """
              ids = {}
              # Standard pg_dump: ALTER COLUMN … ADD GENERATED … AS IDENTITY
              pat = re.compile(
                  r'ALTER TABLE (?:ONLY\s+)?(?:"?public"?\.)?("?\w+"?)[^;]*?'
                  r'ALTER COLUMN ("?\w+"?) ADD GENERATED (\w+(?:\s+\w+)?) AS IDENTITY',
                  re.IGNORECASE,
              )
              for m in pat.finditer(sql):
                  ids.setdefault(_unquote(m.group(1)), {})[_unquote(m.group(2))] = (
                      f'GENERATED {m.group(3).upper()} AS IDENTITY'
                  )

              # Supabase CLI: inline "col type generated by default as identity …"
              tbl_pat = re.compile(
                  r'CREATE TABLE (?:IF NOT EXISTS\s+)?(?:"?public"?\.)?("?\w+"?)\s*\((.*?)\n\s*\);',
                  re.DOTALL | re.IGNORECASE,
              )
              col_id_pat = re.compile(
                  r'"?(\w+)"?\s+\S+.*?\bGENERATED\s+(BY DEFAULT|ALWAYS)\s+AS IDENTITY',
                  re.IGNORECASE,
              )
              for m in tbl_pat.finditer(sql):
                  table = _unquote(m.group(1))
                  for cm in col_id_pat.finditer(m.group(2)):
                      ids.setdefault(table, {})[cm.group(1)] = (
                          f'GENERATED {cm.group(2).upper()} AS IDENTITY'
                      )

              return ids

          def find_rls(sql):
              """Return (set_of_rls_tables, {table: [policy_descriptions]}).

              Supports quoted identifiers and both single-line (pg_dump) and
              multi-line (Supabase CLI) CREATE POLICY syntax.
              """
              rls_tables = set(
                  _unquote(m.group(1))
                  for m in re.finditer(
                      r'ALTER TABLE (?:ONLY\s+)?(?:"?public"?\.)?("?\w+"?)\s+ENABLE ROW LEVEL SECURITY',
                      sql, re.IGNORECASE,
                  )
              )
              policies = {}
              # Match both single-line (pg_dump) and multi-line (Supabase CLI) policy defs.
              # The optional 'AS permissive|restrictive' clause sits between ON and FOR.
              for m in re.finditer(
                  r'CREATE POLICY "([^"]+)"\s+ON (?:"?public"?\.)?("?\w+"?)\s+(?:AS \w+\s+)?FOR (\w+)',
                  sql, re.IGNORECASE,
              ):
                  table = _unquote(m.group(2))
                  policies.setdefault(table, []).append(
                      f'{m.group(3).upper()}: {m.group(1)}'
                  )
              return rls_tables, policies

          def parse_column(raw_line):
              """Parse one column definition line; return dict or None.

              Handles both standard pg_dump column order (DEFAULT before NOT NULL)
              and Supabase CLI column order (NOT NULL before DEFAULT).  Also strips
              double-quotes from column names and correctly excludes the DEFAULT
              keyword that appears inside GENERATED … AS IDENTITY from being
              treated as a column-level default value.
              """
              tokens = raw_line.strip().rstrip(',').split()
              if not tokens:
                  return None
              col_name = _unquote(tokens[0])
              if col_name.upper() in ('CONSTRAINT', 'PRIMARY', 'FOREIGN', 'UNIQUE', 'CHECK', 'REFERENCES', 'KEY'):
                  return None

              default_idx = not_null_idx = gen_idx = ident_idx = None
              i = 0
              while i < len(tokens):
                  tok = tokens[i].upper()
                  if tok == 'GENERATED' and gen_idx is None:
                      gen_idx = i
                  elif tok == 'IDENTITY' and ident_idx is None:
                      ident_idx = i
                  elif tok == 'DEFAULT' and default_idx is None:
                      default_idx = i
                  elif tok == 'NOT' and i + 1 < len(tokens) and tokens[i + 1].upper() == 'NULL':
                      not_null_idx = i
                  i += 1

              # If DEFAULT sits inside GENERATED … IDENTITY it belongs to the identity
              # spec (e.g. "BY DEFAULT"), not to the column's storage default.
              if (default_idx is not None and gen_idx is not None and ident_idx is not None
                      and gen_idx < default_idx < ident_idx):
                  real_default_idx = None
                  for i in range(ident_idx + 1, len(tokens)):
                      if tokens[i].upper() == 'DEFAULT':
                          real_default_idx = i
                          break
                  default_idx = real_default_idx

              type_end = min(
                  gen_idx        if gen_idx        is not None else len(tokens),
                  default_idx    if default_idx    is not None else len(tokens),
                  not_null_idx   if not_null_idx   is not None else len(tokens),
              )
              col_type  = ' '.join(tokens[1:type_end]) or '—'
              nullable  = not_null_idx is None
              default_v = None
              if default_idx is not None:
                  # NOT NULL may precede DEFAULT (Supabase CLI) or follow it (pg_dump)
                  d_end = (not_null_idx
                           if not_null_idx is not None and not_null_idx > default_idx
                           else len(tokens))
                  default_v = ' '.join(tokens[default_idx + 1:d_end]) or None

              return {'name': col_name, 'type': col_type,
                      'nullable': nullable, 'default': default_v}

          def parse_tables(sql):
              """Return {table_name: [column_dicts]} from CREATE TABLE stmts.

              Handles both unquoted (public.table) and quoted ("public"."table")
              schema-qualified names, the optional IF NOT EXISTS clause, and the
              table body closing pattern used by both pg_dump and Supabase CLI.
              """
              tables = {}
              pat = re.compile(
                  r'CREATE TABLE (?:IF NOT EXISTS\s+)?(?:"?public"?\.)?("?\w+"?)\s*\((.*?)\n\s*\);',
                  re.DOTALL | re.IGNORECASE,
              )
              for m in pat.finditer(sql):
                  cols = [parse_column(ln) for ln in m.group(2).splitlines()]
                  tables[_unquote(m.group(1))] = [c for c in cols if c]
              return tables

          # ── gather metadata ──────────────────────────────────────────────────

          tables               = parse_tables(sql)
          pks                  = find_primary_keys(sql)
          fks                  = find_foreign_keys(sql)
          identities           = find_identity_columns(sql)
          rls_tables, policies = find_rls(sql)

          # ── build markdown ───────────────────────────────────────────────────

          out = []

          out.append('# Database Schema Documentation\n\n')
          out.append(f'> Auto-generated by GitHub Actions.  \n')
          out.append(f'> Source: Supabase `public` schema via `supabase db dump` (schema hash: `{schema_hash}`).\n\n')

          out.append('## Tables\n\n')
          for tname in sorted(tables):
              out.append(f'- [`{tname}`](#{tname})\n')
          out.append('\n---\n\n')

          for tname in sorted(tables):
              cols     = tables[tname]
              pk_cols  = pks.get(tname, set())
              fk_cols  = fks.get(tname, {})
              id_cols  = identities.get(tname, {})
              has_rls  = tname in rls_tables

              out.append(f'## `{tname}`\n\n')
              if has_rls:
                  out.append('🔒 **Row Level Security enabled**\n\n')

              out.append('| Column | Type | Nullable | Default | Notes |\n')
              out.append('|--------|------|:--------:|---------|-------|\n')

              for col in cols:
                  cname   = col['name']
                  ctype   = f'`{col["type"]}`'
                  nul     = '✅' if col['nullable'] else '❌'
                  default = f'`{col["default"]}`' if col['default'] else '—'
                  notes   = []
                  if cname in pk_cols:
                      notes.append('🔑 PK')
                  if cname in id_cols:
                      notes.append(id_cols[cname])
                  if cname in fk_cols:
                      notes.append(fk_cols[cname])
                  out.append(
                      f'| `{cname}` | {ctype} | {nul} | {default}'
                      f' | {", ".join(notes) or "—"} |\n'
                  )

              out.append('\n')

              if tname in policies:
                  out.append('### RLS Policies\n\n')
                  for policy in sorted(policies[tname]):
                      out.append(f'- {policy}\n')
                  out.append('\n')

              out.append('---\n\n')

          with open('schema_doc.md', 'w') as f:
              f.writelines(out)

          print(f'schema_doc.md written ({len(tables)} table(s)).')
          PYEOF
          python3 /tmp/gen_schema.py

      - name: Commit schema documentation
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add schema_doc.md
          if git diff --staged --quiet; then
            echo "No changes to commit."
          else
            git commit -m "docs: regenerate schema_doc.md [skip ci]"
            git push || { echo "::error::Failed to push schema_doc.md"; exit 1; }
          fi
